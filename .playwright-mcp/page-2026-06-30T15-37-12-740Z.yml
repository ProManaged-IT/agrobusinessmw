- generic [ref=f9e2]: "{\"success\":true,\"data\":[{\"id\":27,\"district_id\":27,\"district_name\":\"Mzimba\",\"insight_en\":\"Mzimba is a major cattle and maize corridor. Livestock trade is brisk heading into the dry season. Maize prices slightly elevated due to transport costs from the plateau.\",\"insight_ci\":\"Mzimba ndi njira yaikulu ya ng'ombe ndi chimanga. Malonda a ziweto akuchitika mwamsanga. Mitengo ya chimanga yakwezedwa pang'ono chifukwa cha ndalama za kuthawira kuchoka ku phiri.\"}],\"count\":1,\"timestamp\":\"2026-06-30T15:37:12+00:00\"}"